name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch version in build scripts
        run: |
          sed -i '' "s/0\.1\.0/${{ steps.ver.outputs.version }}/g" scripts/make-app.sh
          sed -i '' "s/0\.1\.0/${{ steps.ver.outputs.version }}/g" scripts/make-dmg.sh
          sed -i '' "s/0\.1\.0/${{ steps.ver.outputs.version }}/g" scripts/make-pkg.sh

      - name: Build release binary
        run: swift build -c release

      - name: Assemble .app bundle
        run: ./scripts/make-app.sh

      - name: Verify .app
        run: |
          test -d MacPaper.app
          test -x MacPaper.app/Contents/MacOS/MacPaper
          echo "Bundle OK: $(defaults read "$(pwd)/MacPaper.app/Contents/Info.plist" CFBundleShortVersionString)"

      - name: Package .dmg
        run: ./scripts/make-dmg.sh

      - name: Package .pkg
        run: ./scripts/make-pkg.sh

      - name: List artifacts
        run: ls -lh MacPaper-*.dmg MacPaper-*.pkg

      - name: Compute SHA-256 checksums
        run: |
          shasum -a 256 MacPaper-*.dmg MacPaper-*.pkg | tee SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "MacPaper ${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            MacPaper-*.dmg
            MacPaper-*.pkg
            SHA256SUMS.txt
