name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Assemble .app
        run: ./scripts/make-app.sh

      - name: Smoke-test bundle
        run: |
          test -d MacPaper.app
          test -x MacPaper.app/Contents/MacOS/MacPaper
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' MacPaper.app/Contents/Info.plist
